<svg width="860" height="280" viewBox="0 0 860 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glowBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff46" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#00ff46" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="screenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff46" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00ff46" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="60%">
      <stop offset="40%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.7"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00ff46" stroke-width="0.4" opacity="0.08"/>
    </pattern>
    <pattern id="scanlines" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1" height="2" fill="#00ff46" opacity="0.06"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="860" height="280" fill="#050505"/>
  <rect width="860" height="280" fill="url(#grid)"/>
  <rect width="860" height="280" fill="url(#glowBg)"/>

  <!-- border -->
  <rect x="1" y="1" width="858" height="278" rx="4" fill="none" stroke="#1a3a1a" stroke-width="1"/>

  <!-- scanlines overlay -->
  <rect width="860" height="280" fill="url(#scanlines)"/>

  <!-- vignette -->
  <rect width="860" height="280" fill="url(#vignette)"/>

  <!-- floating symbols -->
  <text x="42" y="52" font-family="monospace" font-size="11" fill="#00ff46" opacity="0.12">01001</text>
  <text x="55" y="198" font-family="monospace" font-size="11" fill="#00ff46" opacity="0.12">10110</text>
  <text x="770" y="62" font-family="monospace" font-size="11" fill="#00ff46" opacity="0.12">∇²ψ</text>
  <text x="755" y="195" font-family="monospace" font-size="11" fill="#00ff46" opacity="0.12">λ=Av</text>
  <text x="22" y="130" font-family="monospace" font-size="11" fill="#00ff46" opacity="0.12">0xFF</text>
  <text x="680" y="240" font-family="monospace" font-size="11" fill="#00ff46" opacity="0.12">∑xᵢ</text>

  <!-- CRT monitor -->
  <!-- monitor body -->
  <rect x="60" y="40" width="140" height="110" rx="8" fill="#0d0d0d" stroke="#1a3a1a" stroke-width="1.5"/>
  <!-- screen bezel -->
  <rect x="68" y="48" width="124" height="94" rx="4" fill="#050505" stroke="#0f2a0f" stroke-width="1"/>
  <!-- screen -->
  <rect x="72" y="52" width="116" height="86" rx="3" fill="#020f02"/>
  <rect x="72" y="52" width="116" height="86" rx="3" fill="url(#screenGlow)"/>
  <!-- screen text -->
  <text x="80" y="75" font-family="monospace" font-size="8" fill="#00ff46" opacity="0.9">$ whoami</text>
  <text x="80" y="88" font-family="monospace" font-size="8" fill="#00cc3a" opacity="0.7">ansh_verma</text>
  <text x="80" y="101" font-family="monospace" font-size="8" fill="#00ff46" opacity="0.9">$ location</text>
  <text x="80" y="114" font-family="monospace" font-size="8" fill="#00cc3a" opacity="0.7">IIT Madras</text>
  <text x="80" y="127" font-family="monospace" font-size="8" fill="#00ff46" opacity="0.9">$ _</text>
  <!-- screen scanlines -->
  <rect x="72" y="52" width="116" height="86" rx="3" fill="url(#scanlines)" opacity="0.4"/>
  <!-- monitor stand -->
  <rect x="115" y="150" width="30" height="12" rx="2" fill="#0d0d0d" stroke="#1a3a1a" stroke-width="1"/>
  <rect x="100" y="162" width="60" height="6" rx="3" fill="#0d0d0d" stroke="#1a3a1a" stroke-width="1"/>
  <!-- power light -->
  <circle cx="178" cy="142" r="2.5" fill="#00ff46" opacity="0.9"/>
  <circle cx="178" cy="142" r="5" fill="#00ff46" opacity="0.15"/>

  <!-- content -->
  <!-- prompt line -->
  <text x="260" y="90" font-family="monospace" font-size="11" fill="#00b844" opacity="0.7">// IIT Madras · computational neuroscience · retro tech</text>

  <!-- name -->
  <text x="258" y="148" font-family="monospace" font-size="52" fill="#00ff46" filter="url(#glow)" letter-spacing="2">ANSH VERMA</text>
  <!-- cursor -->
  <rect x="720" y="108" width="10" height="36" fill="#00ff46" opacity="0.9"/>

  <!-- tagline -->
  <text x="260" y="172" font-family="monospace" font-size="12" fill="#00cc3a" opacity="0.8">understanding how things actually work, one layer at a time</text>

  <!-- tags -->
  <rect x="260" y="188" width="58" height="20" rx="2" fill="#00ff46" fill-opacity="0.05" stroke="#00ff46" stroke-opacity="0.3" stroke-width="1"/>
  <text x="270" y="202" font-family="monospace" font-size="10" fill="#00ff46">Python</text>

  <rect x="326" y="188" width="48" height="20" rx="2" fill="#00ff46" fill-opacity="0.05" stroke="#00ff46" stroke-opacity="0.3" stroke-width="1"/>
  <text x="336" y="202" font-family="monospace" font-size="10" fill="#00ff46">React</text>

  <rect x="382" y="188" width="58" height="20" rx="2" fill="#00ff46" fill-opacity="0.05" stroke="#00ff46" stroke-opacity="0.3" stroke-width="1"/>
  <text x="392" y="202" font-family="monospace" font-size="10" fill="#00ff46">Next.js</text>

  <rect x="448" y="188" width="68" height="20" rx="2" fill="#00ff46" fill-opacity="0.05" stroke="#00ff46" stroke-opacity="0.3" stroke-width="1"/>
  <text x="458" y="202" font-family="monospace" font-size="10" fill="#00ff46">Neuro ML</text>

  <rect x="524" y="188" width="104" height="20" rx="2" fill="#00ff46" fill-opacity="0.05" stroke="#00ff46" stroke-opacity="0.3" stroke-width="1"/>
  <text x="534" y="202" font-family="monospace" font-size="10" fill="#00ff46">Linear Algebra</text>

  <rect x="636" y="188" width="80" height="20" rx="2" fill="#00ff46" fill-opacity="0.05" stroke="#00ff46" stroke-opacity="0.3" stroke-width="1"/>
  <text x="646" y="202" font-family="monospace" font-size="10" fill="#00ff46">Retro Tech</text>

  <!-- bottom line -->
  <text x="260" y="245" font-family="monospace" font-size="10" fill="#00ff46" opacity="0.35">curiosity-driven. easily distracted by beautiful problems. always learning.</text>
</svg>
